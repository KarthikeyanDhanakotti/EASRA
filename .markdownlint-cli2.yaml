# markdownlint-cli2 configuration for EASRA
# Docs are the product here — we enforce real structural issues, not stylistic preferences.

config:
  default: true
  # Line length — we use one-sentence-per-line and long tables.
  MD013: false
  # Inline HTML — needed for README centering and various inline layout.
  MD033: false
  # Duplicate H1 across files — each chapter has its own H1.
  MD024: false
  MD025: false
  # Language tag on fences — ASCII art blocks legitimately have no language.
  MD040: false
  # Bare URLs — permitted in changelog and release notes.
  MD034: false
  # Ordered list numbering — natural numbering is often clearer.
  MD029: false
  # Blank lines around headings/lists — cosmetic.
  MD022: false
  MD031: false
  MD032: false
  # Emphasis as heading — used deliberately in PR/issue templates.
  MD036: false
  # First line must be H1 — PR/issue templates open with H2 by design.
  MD041: false
  # Trailing punctuation in headings — "e.g." / "vs." are allowed.
  MD026: false
  # Empty links / spaces-inside-links — occasional false positives from tables.
  MD039: false
  MD042: false
  # Table column pipe alignment — cosmetic and inconsistent across GitHub renderers.
  MD060: false

globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - ".tmp/**"
  - ".github/**"
