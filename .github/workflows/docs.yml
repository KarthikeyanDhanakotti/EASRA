name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2
      - name: Lint Markdown
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#.tmp" "#.github"
